{% extends "core/base.html" %}
{% load static %}
{% block title %}Apps — Happy Life Unfolding{% endblock %}
{% block content %}
<div class="section">
  <div class="section-label">All apps</div>
  <div class="apps-grid">
    {% for app in apps %}
    <a href="{{ app.get_absolute_url }}" class="app-card">
      <div class="app-icon" style="background: {{ app.accent_color }}20"><img src="{% static app.icon_path %}" alt="{{ app.name }}"></div>
      <h3>{{ app.name }}</h3>
      <p>{{ app.tagline }}</p>
      <div class="app-meta">
        <span class="app-tag" style="background: {{ app.accent_color }}20; color: {{ app.accent_color }}">{{ app.get_category_display }}</span>
        <span class="app-arrow">→</span>
      </div>
    </a>
    {% empty %}
    <p class="muted">Apps coming soon.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
